name: Generar Video Viral
on:
  push:
  repository_dispatch:
    types: [generar_video_viral]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # <--- ¡EL NITRO! Esto guarda las librerías en caché

      - name: Instalar FFmpeg rápido
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar librerías Python
        run: pip install -r requirements.txt || true

      - name: Ejecutar Motor
        run: python3 main.py --tema "Video de prueba automatico" || echo "Fallo al ejecutar main.py"

      - name: Guardar Video
        run: |
          git config --global user.name "Motor Fenix"
          git config --global user.email "bot@ia.com"
          git add static/*.mp4 || true
          git commit -m "Video generado" || true
          git push || true
