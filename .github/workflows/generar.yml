name: Generar Video Viral
on:
  repository_dispatch:
    types: [generar_video_viral]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python y dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Ejecutar Motor Fénix
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 main.py --tema "${{ github.event.client_payload.tema }}"

      - name: Guardar resultado
        run: |
          git config --global user.name "Motor Fénix"
          git config --global user.email "bot@ia.com"
          git add static/*.mp4
          git commit -m "Video generado"
          git push
