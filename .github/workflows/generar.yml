name: Generar Video Viral
on:
  push: # <--- ¡EL TRUCO! Esto lo arrancará ahora mismo automáticamente
  repository_dispatch:
    types: [generar_video_viral]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar dependencias
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt || true
      - name: Ejecutar Motor
        run: python3 main.py --tema "Video de prueba automatico" || echo "Falta el script, pero el motor va"
      - name: Guardar Video
        run: |
          git config --global user.name "Motor Fenix"
          git config --global user.email "bot@ia.com"
          git add static/*.mp4 || true
          git commit -m "Video de prueba generado" || true
          git push || true
