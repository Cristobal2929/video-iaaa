name: Generar Video Viral
on:
  push:
  repository_dispatch:
    types: [generar_video_viral]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Instalar FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v2
      - name: Instalar librerias
        run: pip install -r requirements.txt || true
      - name: Ejecutar Motor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 main.py --tema "Video de prueba con Gemini" || echo "Error en Python"
      - name: Guardar Video
        run: |
          git config --global user.name "Motor Fenix"
          git config --global user.email "bot@ia.com"
          git add static/*.mp4 || true
          git commit -m "Video con Guion de IA" || true
          git push || true
