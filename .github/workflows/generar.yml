name: Generar Video Viral
on:
  repository_dispatch:
    types: [generar_video_viral]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Ejecutar Motor Fenix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 main.py --tema "${{ github.event.client_payload.tema }}"

      - name: Guardar Video
        run: |
          git config --global user.name "Motor Fenix"
          git config --global user.email "bot@ia.com"
          git add static/*.mp4
          git commit -m "Nuevo video generado"
          git push
