name: Generar Video Viral

on:
  repository_dispatch:
    types: [generar_video]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Generar video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python main.py --tema "${{ github.event.client_payload.tema }}"

      # 🔥 SUBIR VIDEO COMO RELEASE
      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: video-${{ github.run_id }}
          name: Video ${{ github.run_id }}
          files: video_final.mp4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 GUARDAR URL PÚBLICA
      - name: Crear URL pública
        run: |
          echo "https://github.com/${{ github.repository }}/releases/download/video-${{ github.run_id }}/video_final.mp4" > public_url.txt

      # 🔥 SUBIR URL AL REPO
      - name: Subir URL al repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public_url.txt
          git commit -m "update video url"
          git push
