name: Generar Video Viral
on:
  repository_dispatch:
    types: [generar_video_viral]
jobs:
  construir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Instalar Herramientas
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install google-generativeai yt-dlp edge-tts
      - name: Ejecutar Motor
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --tema "${{ github.event.client_payload.tema }}"
      - name: 🚀 SUBIR VÍDEO A LA WEB
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add static/video_final.mp4
          git commit -m "Vídeo listo para la web" || echo "Sin cambios"
          git push origin main
