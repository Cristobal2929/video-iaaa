name: Generar Video Viral

on:
  repository_dispatch:
    types: [generar_video_viral]

jobs:
  construir:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: 🛠️ Instalar Magia de Edición
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          # Desbloquear ImageMagick para que pueda escribir texto
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar Librerías
        run: pip install -r requirements.txt

      - name: 🚀 EJECUTAR MOTOR LEYENDA
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py --tema "${{ github.event.client_payload.tema }}" --id "${{ github.event.client_payload.id }}"

      - name: 📦 GUARDAR EN EL HISTORIAL
        run: |
          mkdir -p static
          mv video_final.mp4 static/${{ github.event.client_payload.id }}.mp4
          git config --global user.name "Fenix Studio"
          git config --global user.email "bot@fenixstudio.com"
          git add -f static/*.mp4
          git commit -m "🎬 Vídeo Pro: ${{ github.event.client_payload.id }}"
          git pull origin main --rebase || true
          git push origin main
