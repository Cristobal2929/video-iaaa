<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Fénix IA - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-8 bg-gradient-to-r from-orange-400 to-yellow-500 bg-clip-text text-transparent">
            🚀 Motor Fénix IA
        </h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1 ml-1">Llave Maestra (Se guarda en este móvil)</label>
                <input type="password" id="token" placeholder="ghp_..." 
                       class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:ring-2 focus:ring-orange-500 outline-none text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1 ml-1">Tema del Vídeo</label>
                <input type="text" id="tema" placeholder="Ej: Curiosidades de los dinosaurios" 
                       class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:ring-2 focus:ring-orange-500 outline-none">
            </div>
            
            <button onclick="generar()" id="btn" class="w-full bg-gradient-to-r from-orange-500 to-yellow-600 p-4 rounded-xl font-bold text-lg hover:brightness-110 active:scale-95 transition-all shadow-lg">
                🎬 GENERAR VÍDEO VIRAL
            </button>
        </div>

        <div id="status" class="mt-6 p-4 bg-slate-900/50 rounded-xl border border-slate-700 hidden">
            <p class="text-sm font-mono text-orange-300 text-center" id="msg"></p>
        </div>

        <div id="resultado" class="hidden mt-8 space-y-4">
            <div class="aspect-[9/16] w-full bg-black rounded-2xl overflow-hidden border-2 border-slate-700">
                <video id="reproductor" controls class="w-full h-full">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
        </div>
    </div>

    <script>
        // Función para cargar el token guardado al abrir la web
        window.onload = () => {
            const savedToken = localStorage.getItem('fénix_token');
            if (savedToken) {
                document.getElementById('token').value = savedToken;
            }
        };

        function generar() {
            const token = document.getElementById('token').value;
            const tema = document.getElementById('tema').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            if(!token || !tema) return alert("⚠️ Rellena todo");

            // GUARDAR TOKEN PARA SIEMPRE EN ESTE NAVEGADOR
            localStorage.setItem('fénix_token', token);

            btn.disabled = true;
            document.getElementById('status').classList.remove('hidden');
            msg.innerText = "🛰️ Enviando orden a GitHub...";

            const user = "Cristobal2929";
            const repo = "video-iaaa";
            const urlVideo = `https://raw.githubusercontent.com/${user}/${repo}/main/static/video_final.mp4?v=${new Date().getTime()}`;

            fetch(`https://api.github.com/repos/${user}/${repo}/dispatches`, {
                method: 'POST',
                headers: { 
                    'Authorization': `token ${token}`, 
                    'Accept': 'application/vnd.github.v3+json' 
                },
                body: JSON.stringify({ event_type: 'generar_video_viral', client_payload: { tema: tema } })
            }).then(res => {
                if(!res.ok) throw new Error("Llave incorrecta");
                
                let seg = 60;
                const interval = setInterval(() => {
                    seg--;
                    msg.innerText = `⏳ Fabricando vídeo... ${seg}s`;
                    if(seg <= 0) {
                        clearInterval(interval);
                        msg.innerText = "✨ ¡LISTO!";
                        document.getElementById('videoSource').src = urlVideo;
                        document.getElementById('reproductor').load();
                        document.getElementById('resultado').classList.remove('hidden');
                        btn.disabled = false;
                    }
                }, 1000);
            }).catch(err => {
                alert("❌ ERROR: " + err.message);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
