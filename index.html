<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fénix IA - Professional Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-[3rem] shadow-2xl border border-zinc-800 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter mb-2">FENIX <span class="text-orange-500">STUDIO</span></h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-10">AI Video Engine v2.0</p>

        <div class="space-y-4">
            <input type="text" id="tema" placeholder="Idea para el vídeo..." class="w-full p-5 rounded-2xl bg-black border border-zinc-800 focus:border-orange-500 outline-none text-center text-sm transition-all">
            
            <input type="text" id="codigo" placeholder="Introduce tu Licencia" class="w-full p-4 rounded-2xl bg-zinc-800/50 border border-zinc-800 focus:border-orange-500 outline-none text-center text-xs text-orange-400 font-mono tracking-widest">
            
            <button onclick="enviarOrden()" id="btn" class="w-full bg-white text-black p-5 rounded-2xl font-black hover:bg-orange-500 hover:text-white transition-all active:scale-95 shadow-xl shadow-white/5">GENERAR AHORA</button>
        </div>

        <div id="status" class="mt-8 hidden">
            <p id="msg" class="text-xs text-orange-500 animate-pulse font-bold uppercase"></p>
        </div>

        <div id="reproductor-box" class="mt-8 hidden animate-in zoom-in duration-700">
            <video id="player" controls class="w-full aspect-[9/16] rounded-3xl border-4 border-zinc-800 shadow-2xl bg-black object-cover"></video>
        </div>
    </div>

    <script>
        function enviarOrden() {
            const tema = document.getElementById('tema').value;
            const codigo = document.getElementById('codigo').value;
            const id = "vid_" + Date.now();
            
            if(!tema || !codigo) return alert("Completa todos los campos");

            document.getElementById('status').classList.remove('hidden');
            document.getElementById('msg').innerText = "Validando Licencia...";

            fetch('/api/generar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tema, id, codigo })
            })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    document.getElementById('msg').innerText = "ERROR: " + data.error;
                } else {
                    document.getElementById('msg').innerText = "VÍDEO EN PROCESO... ESPERA 3 MINUTOS.";
                    setTimeout(() => cargarVideo(id), 120000);
                }
            });
        }

        function cargarVideo(id) {
            const url = `https://raw.githubusercontent.com/Cristobal2929/video-iaaa/main/static/${id}.mp4?v=${Math.random()}`;
            const p = document.getElementById('player');
            p.src = url;
            p.load();
            p.oncanplay = () => {
                document.getElementById('reproductor-box').classList.remove('hidden');
                document.getElementById('status').classList.add('hidden');
                p.play();
            };
            p.onerror = () => setTimeout(() => cargarVideo(id), 10000);
        }
    </script>
</body>
</html>
