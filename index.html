<!DOCTYPE html>
<html>
<head>
  <title>FENIX STUDIO</title>
</head>
<body>

<h1>FENIX STUDIO AI VIDEO ENGINE</h1>

<video id="video" controls width="300"></video>

<br>

<button onclick="loadVideo()">REPRODUCIR</button>

<script>
async function loadVideo() {
  const res = await fetch("https://raw.githubusercontent.com/Cristobal2929/video-iaaa/main/public_url.txt");
  const url = await res.text();

  document.getElementById("video").src = url.trim();
}
</script>

</body>
</html>
