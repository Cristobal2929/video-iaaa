<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral AI Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 font-sans">
    
    <h1 class="text-5xl font-extrabold mb-4 bg-gradient-to-r from-yellow-400 to-red-500 bg-clip-text text-transparent italic">
        Viral AI Generator
    </h1>
    <p class="text-gray-400 mb-8 text-center max-w-md">
        Crea vídeos verticales virales con un solo click. IA real, resultados reales.
    </p>
    
    <div class="w-full max-w-md bg-zinc-900 p-8 rounded-2xl border border-zinc-800 shadow-2xl">
        <label class="block text-sm font-medium mb-2 text-gray-300">Tema del vídeo</label>
        <input 
            id="tema"
            type="text" 
            placeholder="Ej: Curiosidades del espacio..." 
            class="w-full p-4 rounded-xl bg-black border border-zinc-700 focus:border-yellow-500 outline-none mb-6 transition-all text-white"
        >
        
        <button 
            onclick="generar()"
            id="btn"
            class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95"
        >
            GENERAR VÍDEO VIRAL
        </button>
    </div>

    <footer class="mt-12 text-zinc-600 text-sm italic">
        Potenciado por Motor Fénix V300 • © 2026
    </footer>

    <script>
        function generar() {
            const tema = document.getElementById('tema').value;
            if(!tema) return alert("Escribe un tema primero");
            
            const btn = document.getElementById('btn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            alert("🚀 ¡Orden enviada! El motor Fénix está procesando: " + tema);
            
            // Simulación de vuelta al estado original
            setTimeout(() => {
                btn.innerText = "GENERAR VÍDEO VIRAL";
                btn.disabled = false;
                btn.style.opacity = "1";
            }, 3000);
        }
    </script>
</body>
</html>
