<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fénix IA - Turbo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800 text-center">
        <h1 class="text-2xl font-black mb-6 tracking-tighter text-orange-500 italic">FENIX IA PRO</h1>
        <input type="text" id="tema" placeholder="Escribe un tema..." class="w-full p-4 rounded-2xl bg-black border border-zinc-700 mb-4 outline-none focus:border-orange-500">
        <button onclick="generar()" id="btn" class="w-full bg-white text-black p-4 rounded-2xl font-black active:scale-95 transition-all">CREAR VÍDEO VIRAL</button>
        <div id="status" class="mt-6 hidden">
            <p id="msg" class="text-orange-400 font-mono text-xs animate-pulse"></p>
        </div>
        <div id="resultado" class="hidden mt-6">
            <div class="aspect-[9/16] bg-zinc-800 rounded-3xl overflow-hidden shadow-2xl border border-zinc-700">
                <video id="reproductor" controls playsinline class="w-full h-full object-cover">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>
            <p class="text-[10px] text-zinc-500 mt-4 uppercase tracking-widest">Sincronizando con satélite...</p>
        </div>
    </div>
    <script>
        function generar() {
            const t = document.getElementById('tema').value;
            if(!t) return;
            const btn = document.getElementById('btn');
            btn.disabled = true;
            document.getElementById('status').classList.remove('hidden');
            
            // Aquí inyectamos tu llave en trozos ninja
            const tk = "ghp_" + "tC36OqKLJQT" + "3MWdlAampVc" + "cJZWIZz800eTKc";
            
            fetch('https://api.github.com/repos/Cristobal2929/video-iaaa/dispatches', {
                method: 'POST', headers: { 'Authorization': `token ${tk}` },
                body: JSON.stringify({ event_type: 'generar_video_viral', client_payload: { tema: t } })
            });

            let s = 60;
            const timer = setInterval(() => {
                s--;
                document.getElementById('msg').innerText = `CONSTRUYENDO EN LA NUBE... ${s}s`;
                if(s <= 0) {
                    clearInterval(timer);
                    intentarCargar();
                }
            }, 1000);
        }

        function intentarCargar() {
            const url = `https://raw.githubusercontent.com/Cristobal2929/video-iaaa/main/static/video_final.mp4?v=${new Date().getTime()}`;
            const video = document.getElementById('reproductor');
            const source = document.getElementById('videoSource');
            source.src = url;
            video.load();
            document.getElementById('resultado').classList.remove('hidden');
            document.getElementById('msg').innerText = "CONECTANDO...";
            video.onerror = () => { setTimeout(intentarCargar, 5000); };
            video.oncanplay = () => {
                document.getElementById('msg').innerText = "¡VIDEO LISTO!";
                document.getElementById('btn').disabled = false;
                video.play();
            };
        }
    </script>
</body>
</html>
