<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Video Debugger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-6 text-orange-400">🕵️‍♂️ Modo Depuración</h1>
        
        <input type="text" id="tema" placeholder="Tema del vídeo..." 
               class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 mb-4 focus:ring-2 focus:ring-orange-500">
        
        <button onclick="generar()" id="btn" class="w-full bg-orange-600 p-3 rounded-lg font-bold hover:bg-orange-500 transition-all">
            🚀 LANZAR MOTOR
        </button>

        <div id="status" class="mt-4 p-3 bg-slate-900 rounded-lg text-sm font-mono text-gray-400 hidden">
            🛰️ Estado: <span id="msg">Esperando...</span>
        </div>

        <div id="resultado" class="hidden mt-6 space-y-4">
            <div class="aspect-[9/16] w-full bg-black rounded-xl overflow-hidden border-2 border-slate-700 relative">
                <video id="reproductor" controls class="w-full h-full" onerror="errorVideo()">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
                <div id="videoError" class="absolute inset-0 flex items-center justify-center bg-slate-900 hidden">
                    <p class="text-red-500 text-center p-4 text-xs">❌ Error de carga.<br>El archivo aún no existe en GitHub o la ruta es incorrecta.</p>
                </div>
            </div>
            <p id="debugPath" class="text-[10px] text-gray-500 break-all text-center"></p>
        </div>
    </div>

    <script>
        function errorVideo() {
            document.getElementById('videoError').classList.remove('hidden');
        }

        function generar() {
            const tema = document.getElementById('tema').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const msg = document.getElementById('msg');
            
            if(!tema) return alert("Escribe un tema");

            btn.disabled = true;
            status.classList.remove('hidden');
            msg.innerText = "Enviando orden a GitHub...";

            // CAMBIA ESTO SI TU USUARIO NO ES Cristobal2929
            const user = "Cristobal2929";
            const repo = "video-iaaa";
            const urlVideo = `https://raw.githubusercontent.com/${user}/${repo}/main/static/video_final.mp4?v=${new Date().getTime()}`;

            // Chivato de ruta
            document.getElementById('debugPath').innerText = "Buscando en: " + urlVideo;

            fetch(`https://api.github.com/repos/${user}/${repo}/dispatches`, {
                method: 'POST',
                headers: { 
                    'Authorization': `token ghp_PON_AQUI_TU_TOKEN_NUEVO`, 
                    'Accept': 'application/vnd.github.v3+json' 
                },
                body: JSON.stringify({ event_type: 'generar_video_viral', client_payload: { tema: tema } })
            }).then(() => {
                msg.innerText = "Motor encendido. Esperando 50 seg...";
                let seg = 50;
                const timer = setInterval(() => {
                    seg--;
                    msg.innerText = `Procesando... ${seg}s`;
                    if(seg <= 0) {
                        clearInterval(timer);
                        msg.innerText = "¡Intentando cargar vídeo!";
                        document.getElementById('videoSource').src = urlVideo;
                        document.getElementById('reproductor').load();
                        document.getElementById('resultado').classList.remove('hidden');
                        document.getElementById('videoError').classList.add('hidden');
                        btn.disabled = false;
                        btn.innerText = "🚀 REINTENTAR GENERAR";
                    }
                }, 1000);
            }).catch(e => {
                msg.innerText = "❌ ERROR AL CONECTAR: " + e;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
