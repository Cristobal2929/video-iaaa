<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESHUÁ - Herramienta Sagrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FDFCF0; font-family: 'Playfair Display', serif; background-image: url('https://www.transparenttextures.com/patterns/parchment.png'); }
        .text-gold { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); -webkit-background-clip: text; color: transparent; }
        .bg-gold { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); }
        .glass-sacro { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(191, 149, 63, 0.4); box-shadow: 0 20px 40px rgba(191, 149, 63, 0.1); }
        .font-cinzel { font-family: 'Cinzel', serif; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <main class="container mx-auto px-4 py-12 max-w-4xl text-center">
        <header class="mb-16" data-aos="fade-down">
            <h1 class="font-cinzel text-6xl md:text-7xl text-gold mb-4">TESHUÁ</h1>
            <p class="text-2xl italic text-gray-700">El Código del Alma Relevado</p>
        </header>

        <section class="glass-sacro rounded-3xl p-8 md:p-16 mb-16" data-aos="zoom-in">
            <h2 class="font-cinzel text-3xl text-gold mb-8">Calculadora de Código Sagrado</h2>
            <div class="max-w-md mx-auto space-y-6">
                <input type="text" id="userName" placeholder="Nombre para el Cálculo" 
                       class="w-full p-4 rounded-xl border border-[#BF953F]/30 bg-white/50 outline-none focus:ring-2 focus:ring-[#BF953F]">
                <button onclick="activarCodigo()" 
                        class="w-full bg-gold text-white font-cinzel py-4 rounded-xl shadow-lg transform hover:scale-105 transition-all">
                    OBTENER CÓDIGO
                </button>
            </div>

            <div id="revelacion" class="hidden mt-12 pt-8 border-t border-[#BF953F]/20">
                <div class="inline-block p-6 bg-white/40 rounded-full mb-6">
                    <span id="codigoNum" class="text-5xl font-cinzel text-gold font-bold">650</span>
                </div>
                <h3 id="faseTitulo" class="font-cinzel text-2xl mb-4 text-gray-900"></h3>
                <p id="mensajeDios" class="text-xl italic leading-relaxed text-gray-800"></p>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
        function activarCodigo() {
            const nombre = document.getElementById('userName').value.trim();
            if (!nombre) return alert("Escribe un nombre.");
            const base = nombre.length % 4;
            const revelacion = document.getElementById('revelacion');
            revelacion.classList.remove('hidden');
            const misiones = [
                { fase: "PORTADOR DE LUZ", msj: "Tu sabiduría ilumina el camino de los demás." },
                { fase: "PROTECTOR JUSTO", msj: "Tu fe es el escudo en tiempos de prueba." },
                { fase: "HIJO DE LA LIBERACIÓN", msj: "Eres el puente puro hacia la Fuente Divina." },
                { fase: "GUERRERO DE VERDAD", msj: "Defiendes el equilibrio y la justicia del cielo." }
            ];
            const seleccion = misiones[base];
            document.getElementById('faseTitulo').innerText = seleccion.fase;
            document.getElementById('mensajeDios').innerText = `"${seleccion.msj}"`;
        }
    </script>
</body>
</html>
